services:
  postgres:
    image: postgres:16-alpine
    container_name: quejugamos-postgres
    environment:
      POSTGRES_USER: quejugamos
      POSTGRES_PASSWORD: quejugamos
      POSTGRES_DB: quejugamos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quejugamos -d quejugamos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quejugamos-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quejugamos-api
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: quejugamos
      DATABASE_PASSWORD: quejugamos
      DATABASE_NAME: quejugamos
      DATABASE_URL: postgresql://quejugamos:quejugamos@postgres:5432/quejugamos
      DATABASE_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
